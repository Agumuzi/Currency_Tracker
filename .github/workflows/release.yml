name: Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package unsigned app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check localizations
        run: python3 scripts/check-localizations.py

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme "Currency Tracker" \
            -destination "generic/platform=macOS" \
            -archivePath "$PWD/build/Currency Tracker.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p build/release
          ditto -c -k --keepParent "build/Currency Tracker.xcarchive/Products/Applications/Currency Tracker.app" "build/release/Currency-Tracker-${VERSION}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Currency-Tracker
          path: build/release/*.zip
