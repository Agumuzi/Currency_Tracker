name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Build and test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check localizations
        run: python3 scripts/check-localizations.py

      - name: Run unit tests
        run: xcodebuild test -scheme "Currency Tracker" -destination "platform=macOS" -derivedDataPath "$PWD/.build/DerivedData" -only-testing:"Currency TrackerTests"

      - name: Run UI smoke test
        run: xcodebuild test -scheme "Currency Tracker" -destination "platform=macOS" -derivedDataPath "$PWD/.build/DerivedData" -only-testing:"Currency TrackerUITests/Currency_TrackerUITests/testSettingsWindowStartsBlankWithEmptyAPIState"
